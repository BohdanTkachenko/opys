name: Release-plz

# release-plz drives the release process from conventional commits on `main`:
#   * release-pr  — opens/updates a "release" PR that bumps the crate version and
#                   updates CHANGELOG.md. Merging it is the act of releasing.
#   * release     — once that PR is merged (the version on `main` changed),
#                   tags it and cuts a GitHub release.
#
# Releases go to GitHub only — `publish = false` in release-plz.toml means we
# never `cargo publish` to crates.io, so no `CARGO_REGISTRY_TOKEN` is needed. The
# default `GITHUB_TOKEN` covers the PR/tag/release steps; note that PRs it opens
# do not trigger the CI workflow — swap in a PAT or GitHub App token (as
# `GITHUB_TOKEN`) if you want CI to run on the release PR.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Cut a GitHub release (tag + changelog) when a release PR has been merged.
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'BohdanTkachenko' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Open/update the release PR (version bump + changelog), then sync the
  # packaging manifests onto its branch so they ship in lockstep.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'BohdanTkachenko' }}
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync packaging manifests on the release PR
        # Run whenever a release PR exists (created *or* updated): release-plz
        # force-pushes the release branch on every update, dropping any prior sync
        # commit, so we must re-apply the manifest sync on top each time.
        if: ${{ steps.release-plz.outputs.pr != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch='${{ fromJSON(steps.release-plz.outputs.pr).head_branch }}'
          # On the post-merge push there is no new release PR (release-plz still
          # emits a non-empty `pr` object, but with an empty head_branch), so
          # there is nothing to sync — skip rather than `git switch ''`.
          if [ -z "$branch" ]; then
            echo "No release-PR branch to sync; nothing to do."
            exit 0
          fi
          git fetch origin "$branch"
          git switch "$branch"
          scripts/sync-versions.sh
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: sync packaging manifests to crate version"
            git push origin "$branch"
          fi
